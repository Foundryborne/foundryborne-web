---
layout: default
---
<article class="post-card" style="margin-top: 4rem; max-width: 800px; margin-left: auto; margin-right: auto;">
  <div class="post-header">
    <h1 class="post-title" style="margin-bottom: 0.5rem; border-bottom: 1px solid var(--card-border); padding-bottom: 0.5rem;">{{ page.title }}</h1>
    <p class="news-meta" style="font-size: 1rem; margin-bottom: 2rem; opacity: 0.8;">{{ page.date | date: "%B %-d, %Y" }}</p>
  </div>

  <div class="post-content" style="line-height: 1.8;">
    {{ content }}
  </div>
</article>
